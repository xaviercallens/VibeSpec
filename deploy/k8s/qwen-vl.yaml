# Qwen2.5-VL-72B Model Serving — GKE Deployment
# Requires 4× NVIDIA L4 GPUs (24GB each)
# Estimated cost: $3.07/hr (Spot) or $8.94/hr (On-Demand)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-vl
  namespace: vibespec
  labels:
    app: qwen-vl
    component: model-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen-vl
  template:
    metadata:
      labels:
        app: qwen-vl
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      containers:
        - name: vllm
          image: us-central1-docker.pkg.dev/PROJECT_ID/vibespec/qwen-vl:latest
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "4"
            limits:
              cpu: "16"
              memory: "64Gi"
              nvidia.com/gpu: "4"
          env:
            - name: HF_HOME
              value: /models
            - name: TRANSFORMERS_CACHE
              value: /models
          volumeMounts:
            - name: model-cache
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: qwen-vl-models
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: qwen-vl
  namespace: vibespec
spec:
  selector:
    app: qwen-vl
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen-vl-models
  namespace: vibespec
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
  storageClassName: premium-rwo
