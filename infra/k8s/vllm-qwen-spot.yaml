# VibeSpec Inference Server - vLLM Qwen2.5-VL on L4 GPU (Spot)
# Deploys as an OpenAI-compatible API to handle visual layout processing natively within the cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen-spot
  namespace: default
  labels:
    app: vllm-qwen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen
  template:
    metadata:
      labels:
        app: vllm-qwen
    spec:
      # Margin Protector: Tolerate Spot (Preemptible) nodes to slash compute costs by 70%+
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      # Use GKE node selector for exact GPU architectural match (NVIDIA L4)
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
        cloud.google.com/gke-spot: "true"
        
      containers:
      - name: vllm-server
        image: vllm/vllm-openai:latest
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args:
        - "--model"
        - "Qwen/Qwen2.5-VL-7B-Instruct"
        - "--gpu-memory-utilization"
        - "0.9"
        - "--max-model-len"
        - "8192"
        # Since it's a visual model, we enforce limits to prevent OOMs on the 24GB L4
        - "--enforce-eager" 
        ports:
        - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: "1" # Explicit request for 1 GPU
            memory: "30Gi"
          requests:
            nvidia.com/gpu: "1"
            memory: "20Gi"
        volumeMounts:
        - name: huggingface-cache
          mountPath: /root/.cache/huggingface

      volumes:
      - name: huggingface-cache
        emptyDir: {} # Ephemeral caching for the weights downloads

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-api-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: vllm-qwen
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
